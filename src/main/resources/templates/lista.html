<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="text-align: center" class="mb-0">Lista de Produtos</h2>

        <div class="d-flex gap-2">
            <a href="/produto/formulario" class="btn btn-primary">
                + Novo produto
            </a>

            <a href="/categoria/formulario" class="btn btn-success">
                + Nova Categoria
            </a>
        </div>
    </div>

    <div class="card shadow">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">

                <thead class="table-dark text-center">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Quantidade</th>
                    <th>Categoria</th>
                    <th>Imagem</th>
                    <th>Ações</th>
                </tr>
                </thead>

                <tbody class="text-center">
                <tr th:each="p : ${produtos}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.nome}"></td>

                    <td>
                        R$ <span th:text="${#numbers.formatDecimal(p.preco,1,2)}"></span>
                    </td>

                    <td th:text="${p.quantidade}"></td>

                    <td th:text="${p.categoria?.nome}"></td>

                    <td>
                        <img th:src="${p.imagem}"
                             alt="img"
                             class="img-thumbnail"
                             style="width: 80px; height: 80px; object-fit: cover;">
                    </td>

                    <td>
                        <a th:href="@{/produto/editar/{id}(id=${p.id})}"
                           class="btn btn-warning btn-sm me-1">
                            Editar
                        </a>

                        <a th:href="@{/produto/excluir/{id}(id=${p.id})}"
                           class="btn btn-danger btn-sm">
                            Excluir
                        </a>
                    </td>
                </tr>
                </tbody>

            </table>
        </div>
    </div>
</div>
</body>
</html>
