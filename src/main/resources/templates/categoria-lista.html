<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Categorias</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Lista de Categorias</h2>

        <a href="/categoria/formulario" class="btn btn-primary">
            + Nova categoria
        </a>
    </div>

    <div class="card shadow">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">

                <thead class="table-dark text-center">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
                </thead>

                <tbody class="text-center">
                <tr th:each="c : ${categorias}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.nome}"></td>

                    <td>
                        <a th:href="@{/categoria/editar/{id}(id=${c.id})}"
                           class="btn btn-warning btn-sm me-1">
                            Editar
                        </a>

                        <a th:href="@{/categoria/excluir/{id}(id=${c.id})}"
                           class="btn btn-danger btn-sm">
                            Excluir
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(categorias)}">
                    <td colspan="3">Nenhuma categoria cadastrada</td>
                </tr>

                </tbody>

            </table>
        </div>
    </div>

</div>

</body>
</html>
