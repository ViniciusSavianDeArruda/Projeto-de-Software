<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="card shadow p-4" style="width: 400px;">
    <h4 class="text-center mb-3">Cadastro de Produtos</h4>

    <form method="POST" th:action="@{/produto/salvar}" th:object="${produto}">

        <input th:field="*{id}" type="hidden"/>

        <div class="mb-2">
            <input type="text" class="form-control form-control-sm" th:field="*{nome}" placeholder="Nome">
        </div>

        <div class="mb-2">
            <input type="text" class="form-control form-control-sm" th:field="*{descricao}" placeholder="Descrição">
        </div>

        <div class="mb-2">
            <input type="number" step="0.01" class="form-control form-control-sm" th:field="*{preco}" placeholder="Preço">
        </div>

        <div class="mb-2">
            <input type="number" class="form-control form-control-sm" th:field="*{quantidade}" placeholder="Quantidade">
        </div>

        <div class="mb-3">
            <input type="text" class="form-control form-control-sm" th:field="*{imagem}" placeholder="URL da imagem">
        </div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success btn-sm">Cadastrar</button>
            <button type="reset" class="btn btn-secondary btn-sm">Limpar</button>
        </div>
    </form>

    <div style="text-align: center; margin-top: 5px; font-size: 14px;">
        <a href="/">Voltar</a>
    </div>
</div>

</body>
</html>
