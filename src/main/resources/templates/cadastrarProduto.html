<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form method="POST" action="/produto/salvar" th:object="${produto}">
    <label>Nome</label></br>
    <input type="text" id="nome" th:field="*{nome}"></br>
    <label>Descrição</label></br>
    <input type="text" id="descricao"th:field="*{descricao}"></br>
    <label>Preço</label></br>
    <input type="text" id="preco"th:field="*{preco}"></br>
    <label>Quantidade</label></br>
    <input type="text" id="quantidade"th:field="*{quantidade}"></br>
    <label>Imagem</label></br>
    <input type="text" id="imagem"th:field="*{imagem}"></br>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">

</form>


</body>
</html>
